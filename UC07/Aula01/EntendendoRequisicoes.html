<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Requisição de API</title>
</head>
<body>
    
    <button onclick="buscar">Buscar Dados</button>

    <script>
        // Função que faz a chamada quando o botão é clicado
        function buscar(){
            // fetch faz uma requisição HTTP para um servidor (API)
            // Neste caso, estamos pedindo um post específico (id = 1)
            fetch('https://jsonplaceholder.typicode.com/posts/1')

            // O .then trata o retorno da requisição
            // Neste caso, convertendo para JSON
            .then(res => res.json())

            // Depois do JSON pronto, recebemos os dados
            // e exibimos no console do navegador
            .then(data => console.log(data))
        }
    </script>

</body>
</html>
